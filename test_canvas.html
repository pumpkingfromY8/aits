            from {
                transform: scale(0.7);

            }

    <script type="module">
        import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js';

        // Scene
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0f172a);

        // Camera
        const camera = new THREE.PerspectiveCamera(
            75,
            window.innerWidth / window.innerHeight,
            0.1,
            1000
        );

        camera.position.z = 5;

        // Renderer
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
        scene.add(ambientLight);

        const pointLight = new THREE.PointLight(0xffffff, 2);
        pointLight.position.set(5, 5, 5);
        scene.add(pointLight);

        // Main Cube
        const cubeGeometry = new THREE.BoxGeometry(1.5, 1.5, 1.5);
        const cubeMaterial = new THREE.MeshStandardMaterial({
            color: 0x38bdf8,
            metalness: 0.5,
            roughness: 0.2
        });

        const cube = new THREE.Mesh(cubeGeometry, cubeMaterial);
        scene.add(cube);

        // Floating particles
        const particles = [];

        for (let i = 0; i < 100; i++) {
            const geo = new THREE.SphereGeometry(0.03, 8, 8);
            const mat = new THREE.MeshBasicMaterial({ color: 0xffffff });
            const particle = new THREE.Mesh(geo, mat);

            particle.position.x = (Math.random() - 0.5) * 20;
            particle.position.y = (Math.random() - 0.5) * 20;
            particle.position.z = (Math.random() - 0.5) * 20;

            particles.push(particle);
            scene.add(particle);
        }

        // Mouse interaction
        const mouse = new THREE.Vector2();
        const raycaster = new THREE.Raycaster();

        window.addEventListener('mousemove', (event) => {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            camera.position.x = mouse.x * 1.5;
            camera.position.y = mouse.y * 1.5;
            camera.lookAt(scene.position);
        });

        // Click to create spheres
        window.addEventListener('click', () => {
            const geometry = new THREE.SphereGeometry(0.2, 32, 32);
            const material = new THREE.MeshStandardMaterial({
                color: Math.random() * 0xffffff,
                emissive: Math.random() * 0xffffff,
                emissiveIntensity: 0.3
            });

            const sphere = new THREE.Mesh(geometry, material);

            sphere.position.x = (Math.random() - 0.5) * 6;
            sphere.position.y = (Math.random() - 0.5) * 6;
            sphere.position.z = (Math.random() - 0.5) * 6;

            sphere.userData.speed = Math.random() * 0.02 + 0.01;

            scene.add(sphere);
            floatingObjects.push(sphere);
        });

        const floatingObjects = [];

        // Animation loop
        function animate() {
            requestAnimationFrame(animate);

            // Rotate cube
            cube.rotation.x += 0.01;
            cube.rotation.y += 0.01;

            // Hover detection
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(cube);

            if (intersects.length > 0) {
                cube.material.color.set(0xff6600);
                cube.scale.set(1.2, 1.2, 1.2);
            } else {
                cube.material.color.set(0x38bdf8);
                cube.scale.set(1, 1, 1);
            }

            // Animate floating objects
            floatingObjects.forEach((obj, index) => {
                obj.rotation.x += obj.userData.speed;
                obj.rotation.y += obj.userData.speed;
                obj.position.y += Math.sin(Date.now() * 0.001 + index) * 0.002;
            });

            // Move particles slowly
            particles.forEach((particle, i) => {
                particle.position.y += Math.sin(Date.now() * 0.001 + i) * 0.0005;
            });

            renderer.render(scene, camera);
        }

        animate();

        // Resize support
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });











    </script>



    <script>

        // =========================

        const SUPABASE_URL = "https://awfifqxnniqkrmhvbonn.supabase.co";

        const SUPABASE_ANON_KEY =
            "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF3ZmlmcXhubmlxa3JtaHZib25uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc4Mjg0NzcsImV4cCI6MjA4MzQwNDQ3N30.IkL3OUOS2m_JKTSI4RhGKZZDxH-n0sx2bDEkzO79vr0";

        const supabaseClient = supabase.createClient(
            SUPABASE_URL,
            SUPABASE_ANON_KEY
        );

        // =========================
        // FORM SUBMIT EVENT
        // =========================

        document.querySelector(".form").addEventListener("submit", async function (e) {

            // Prevent page refresh
            e.preventDefault();

            await uploadFile();

        });

        // =========================
        // UPLOAD FUNCTION
        // =========================

        async function uploadFile() {

            const fullnameInput = document.querySelector('input[type="fullname"]');
            const trainingCenter = document.getElementById("trainingCenter");

            const fileInput = document.getElementById("fileInput");

            const status = document.getElementById("status");
            const previewImage = document.getElementById("previewImage");

            // =========================
            // GET VALUES
            // =========================

            const fullname = fullnameInput.value.trim();
            const center = trainingCenter.value;

            const file = fileInput.files[0];

            // =========================
            // VALIDATION
            // =========================

            if (!fullname) {
                status.innerHTML = "Please enter fullname.";
                return;
            }

            if (center === "none") {
                status.innerHTML = "Please select training center.";
                return;
            }

            if (!file) {
                status.innerHTML = "Please select a file.";
                return;
            }

            // =========================
            // CREATE UNIQUE FILENAME
            // =========================

            const fileName = `${Date.now()}_${file.name}`;

            status.innerHTML = "Uploading...";

            // =========================
            // UPLOAD FILE TO STORAGE
            // =========================

            const { data, error } = await supabaseClient
                .storage
                .from("aits_assets")
                .upload(fileName, file, {
                    cacheControl: "3600",
                    upsert: false,
                    contentType: file.type
                });

            // =========================
            // HANDLE ERROR
            // =========================

            if (error) {

                console.error(error);

                status.innerHTML = `
                Upload Failed: ${error.message}
            `;

                return;
            }

            // =========================
            // GENERATE PUBLIC URL
            // =========================

            const imageUrl =
                `${SUPABASE_URL}/storage/v1/object/public/aits_assets/${data.path}`;

            // =========================
            // SAVE DATA TO DATABASE
            // =========================

            const { error: insertError } = await supabaseClient
                .from("submitted_tasks")
                .insert([
                    {
                        fullname: fullname,
                        training_center: center,
                        image_url: imageUrl,
                        image_name: fileName
                    }
                ]);

            // =========================
            // HANDLE INSERT ERROR
            // =========================

            if (insertError) {

                console.error(insertError);

                status.innerHTML = `
                File uploaded but database insert failed:
                ${insertError.message}
            `;

                return;
            }

            // =========================
            // SHOW PREVIEW
            // =========================

            previewImage.src = imageUrl;

            // =========================
            // SUCCESS MESSAGE
            // =========================

            status.innerHTML = `
            Upload Successful!
        `;

            console.log("Uploaded File:", data);
            console.log("Image URL:", imageUrl);

            // =========================
            // RESET FORM
            // =========================

            document.querySelector(".form").reset();


            // =========================
            // SHOW SUCCESS OVERLAY
            // =========================

            const overlay = document.getElementById("successOverlay");

            overlay.style.display = "flex";

            // =========================
            // COUNTDOWN REDIRECT
            // =========================

            let seconds = 5;

            const countdownText = document.getElementById("countdownText");

            const countdown = setInterval(() => {

                seconds--;

                countdownText.innerHTML =
                    `Redirecting in ${seconds} seconds...`;

                if (seconds <= 0) {

                    clearInterval(countdown);

                    // Go back to previous page
                    window.history.back();

                    // OR redirect manually:
                    // window.location.href = "index.html";

                }

            }, 1000);

        }



    </script>
